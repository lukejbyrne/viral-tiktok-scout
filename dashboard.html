<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viral TikTok Scout</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #000; color: #e0e0e0; }

  /* Header */
  .header {
    padding: 32px 40px 24px;
    background: linear-gradient(135deg, #0a0a0a, #111);
    border-bottom: 1px solid #1a1a1a;
    position: sticky; top: 0; z-index: 100;
  }
  .header h1 { font-size: 1.8em; color: #fff; margin-bottom: 4px; cursor: pointer; }
  .header h1:hover { color: #3b82f6; }
  .header p { color: #666; font-size: 0.9em; }

  /* Search */
  .search-row {
    display: flex; gap: 8px; margin-top: 16px; align-items: center;
  }
  #niche-input {
    flex: 1; padding: 10px 16px; border-radius: 10px; border: 1px solid #333;
    background: #111; color: #fff; font-size: 0.95em; outline: none;
    transition: border-color 0.2s;
  }
  #niche-input:focus { border-color: #3b82f6; }
  #niche-input::placeholder { color: #444; }
  #search-btn {
    padding: 10px 20px; border-radius: 10px; border: none;
    background: #3b82f6; color: #fff; font-weight: 600; font-size: 0.85em;
    cursor: pointer; transition: background 0.2s; white-space: nowrap;
  }
  #search-btn:hover { background: #2563eb; }
  #search-btn:disabled { background: #1e3a5f; color: #666; cursor: not-allowed; }
  #settings-btn {
    padding: 10px 16px; border-radius: 10px; border: 1px solid #333;
    background: transparent; color: #666; font-size: 0.85em; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
  }
  #settings-btn:hover { border-color: #555; color: #999; }

  .settings-panel {
    display: none; margin-top: 12px; padding: 16px; background: #0d0d0d;
    border: 1px solid #222; border-radius: 10px;
  }
  .settings-panel.open { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .settings-panel label { font-size: 0.8em; color: #888; margin-right: 4px; }
  .settings-panel input {
    flex: 1; min-width: 200px; padding: 8px 12px; border-radius: 8px;
    border: 1px solid #333; background: #111; color: #fff; font-size: 0.85em;
    font-family: monospace;
  }
  .settings-panel button {
    padding: 8px 16px; border-radius: 8px; border: none;
    background: #22c55e; color: #000; font-weight: 600; font-size: 0.8em; cursor: pointer;
  }
  #token-status { font-size: 0.8em; color: #22c55e; }

  /* Filters */
  .filters {
    display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; align-items: center;
  }
  .filter-btn {
    padding: 6px 16px; border-radius: 20px; border: 1px solid #333;
    background: transparent; color: #999; cursor: pointer; font-size: 0.85em;
    transition: all 0.2s;
  }
  .filter-btn:hover { border-color: #555; color: #fff; }
  .filter-btn.active { background: #fff; color: #000; border-color: #fff; font-weight: 600; }

  .sort-select {
    margin-left: auto; padding: 6px 12px; border-radius: 8px;
    border: 1px solid #333; background: #111; color: #999; font-size: 0.85em;
    cursor: pointer;
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
    padding: 20px 40px 60px;
  }

  /* Card */
  .card {
    background: #111; border: 1px solid #1a1a1a; border-radius: 16px;
    overflow: hidden; transition: all 0.2s;
  }
  .card:hover { border-color: #333; transform: translateY(-2px); }

  .card-embed {
    width: 100%; aspect-ratio: 9/12; background: #0a0a0a;
    position: relative; overflow: hidden; cursor: pointer;
  }
  .card-embed iframe { width: 100%; height: 100%; border: none; }
  .card-embed .placeholder {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
    background: linear-gradient(135deg, #0a0a0a, #151520);
    cursor: pointer; transition: background 0.2s;
  }
  .card-embed .placeholder:hover { background: linear-gradient(135deg, #111, #1a1a2e); }
  .play-icon {
    width: 56px; height: 56px; border-radius: 50%;
    background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4em;
  }
  .placeholder-text { color: #555; font-size: 0.8em; }

  .card-body { padding: 12px; }

  .card-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .card-category {
    font-size: 0.7em; padding: 3px 10px; border-radius: 12px;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .cat-ai { background: #1a1030; color: #a78bfa; }
  .cat-satisfying { background: #102010; color: #86efac; }
  .cat-tech { background: #101828; color: #7dd3fc; }
  .cat-generated { background: #201818; color: #fca5a5; }

  .card-author { color: #666; font-size: 0.8em; }

  .card-text {
    color: #999; font-size: 0.85em; line-height: 1.4;
    margin-bottom: 12px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }

  .card-stats { display: flex; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
  .stat { display: flex; flex-direction: column; }
  .stat-value { font-weight: 700; color: #fff; font-size: 0.85em; }
  .stat-label { font-size: 0.6em; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }

  .card-actions { display: flex; gap: 8px; }
  .btn {
    flex: 1; padding: 7px 6px; border-radius: 8px; border: none;
    font-size: 0.75em; font-weight: 600; cursor: pointer; transition: all 0.2s;
    text-align: center; text-decoration: none; display: block;
  }
  .btn-remake { background: linear-gradient(135deg, #1a2e1a, #102e20); color: #22c55e; border: 1px solid #22c55e33; }
  .btn-remake:hover { background: linear-gradient(135deg, #203e20, #153e28); transform: scale(1.02); }
  .btn-remake.clicked { background: #102010; color: #86efac; }
  .btn-copy { background: #1a1a2e; color: #a78bfa; }
  .btn-copy:hover { background: #252540; }
  .btn-copy.copied { background: #102010; color: #86efac; }
  .btn-open { background: #1a1a1a; color: #999; }
  .btn-open:hover { background: #252525; color: #fff; }

  .duration-badge {
    position: absolute; bottom: 8px; right: 8px;
    background: rgba(0,0,0,0.8); color: #fff; padding: 2px 8px;
    border-radius: 4px; font-size: 0.75em; font-weight: 600;
    z-index: 2;
  }

  /* Star / Favorites */
  .star-btn {
    position: absolute; top: 8px; right: 8px; z-index: 3;
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(0,0,0,0.6); border: none;
    color: #555; font-size: 1.1em; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .star-btn:hover { color: #fcd34d; background: rgba(0,0,0,0.8); }
  .star-btn.starred { color: #fcd34d; }

  /* Empty state */
  .empty {
    grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: #444;
  }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; padding: 16px; }
    .header { padding: 20px 16px 16px; }
  }
</style>
</head>

</div>

function formatNum(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1).replace('.0','') + 'M';
  if (n >= 1000) return (n/1000).toFixed(1).replace('.0','') + 'K';
  return n.toString();
}

function formatDuration(s) {
  if (!s) return '';
  const m = Math.floor(s/60);
  const sec = s % 60;
  return m + ':' + sec.toString().padStart(2,'0');
}

// Dynamic category colors
const catColors = {};
const colorPool = [
  { bg: '#1a1030', fg: '#a78bfa' },
  { bg: '#102010', fg: '#86efac' },
  { bg: '#101828', fg: '#7dd3fc' },
  { bg: '#201818', fg: '#fca5a5' },
  { bg: '#1a1a10', fg: '#fcd34d' },
  { bg: '#101a1a', fg: '#67e8f9' },
  { bg: '#1a100a', fg: '#fdba74' },
  { bg: '#1a0a1a', fg: '#f0abfc' },
];
let colorIndex = 0;

function catClass(cat) {
  if (!catColors[cat]) {
    const c = colorPool[colorIndex % colorPool.length];
    catColors[cat] = c;
    colorIndex++;
    // Inject a dynamic CSS rule
    const style = document.createElement('style');
    const cls = 'cat-' + cat.toLowerCase().replace(/[^a-z0-9]/g, '-');
    style.textContent = `.${cls} { background: ${c.bg}; color: ${c.fg}; }`;
    document.head.appendChild(style);
  }
  return 'cat-' + cat.toLowerCase().replace(/[^a-z0-9]/g, '-');
}

// Favorites — saves to localStorage AND server-side stars.json
let starredVideos = [];
let starredIds = [];

async function loadStars() {
  // Try server first, fall back to localStorage
  try {
    const resp = await fetch('/api/stars');
    if (resp.ok) {
      starredVideos = await resp.json();
      starredIds = starredVideos.map(v => v.id);
      localStorage.setItem('favorite_ids', JSON.stringify(starredIds));
      localStorage.setItem('favorite_videos', JSON.stringify(starredVideos));
      return;
    }
  } catch {}
  // Fallback to localStorage (works when opened as plain HTML file)
  try { starredIds = JSON.parse(localStorage.getItem('favorite_ids') || '[]'); } catch { starredIds = []; }
  try { starredVideos = JSON.parse(localStorage.getItem('favorite_videos') || '[]'); } catch { starredVideos = []; }
}

function getFavoriteVideos() { return starredVideos; }
function isFavorite(id) { return starredIds.includes(id); }

async function toggleFavorite(id, btn) {
  if (starredIds.includes(id)) {
    starredIds = starredIds.filter(f => f !== id);
    starredVideos = starredVideos.filter(v => v.id !== id);
    btn.classList.remove('starred');
  } else {
    starredIds.push(id);
    const video = currentVideos.find(v => v.id === id);
    if (video) starredVideos.push(video);
    btn.classList.add('starred');
  }
  // Save to localStorage always
  localStorage.setItem('favorite_ids', JSON.stringify(starredIds));
  localStorage.setItem('favorite_videos', JSON.stringify(starredVideos));
  // Save to server (fire and forget — works when server is running, silent fail otherwise)
  try { fetch('/api/stars', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(starredVideos) }); } catch {}
}

// Home button
function goHome() {
  currentVideos = [...videos];
  document.getElementById('niche-input').value = '';
  document.getElementById('subtitle').textContent = 'Browse trending videos — search your niche, preview inline, remake with AI';
  buildFilterButtons();
  renderCards('all', 'plays');
  setupLazyLoad();
}

// Niche management
const defaultNiches = ['Health & Fitness', 'Business', 'Cooking', 'Real Estate', 'Fashion', 'Gaming', 'Beauty', 'Travel', 'Finance', 'Pets', 'Comedy', 'Motivation'];

function getNiches() {
  try {
    const saved = localStorage.getItem('niches');
    return saved ? JSON.parse(saved) : defaultNiches;
  } catch { return defaultNiches; }
}

function saveNiches() {
  const val = document.getElementById('niches-input').value.trim();
  if (val) {
    const niches = val.split(',').map(s => s.trim()).filter(Boolean);
    localStorage.setItem('niches', JSON.stringify(niches));
    document.getElementById('niches-status').textContent = 'Saved!';
    setTimeout(() => { document.getElementById('niches-status').textContent = ''; }, 2000);
    buildFilterButtons();
  }
}

function quickSearch(query) {
  document.getElementById('niche-input').value = query;
  searchNiche();
}

function buildFilterButtons() {
  const row = document.getElementById('filters-row');
  const sortEl = document.getElementById('sort-select');
  row.innerHTML = '';

  // Starred button
  const favBtn = document.createElement('button');
  favBtn.className = 'filter-btn';
  favBtn.dataset.filter = 'favorites';
  favBtn.textContent = 'Starred';
  favBtn.style.color = '#fcd34d';
  favBtn.style.borderColor = '#fcd34d33';
  favBtn.addEventListener('click', () => {
    row.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    favBtn.classList.add('active');
    renderCards('favorites', document.getElementById('sort-select').value);
    setupLazyLoad();
  });
  row.appendChild(favBtn);

  // All button (shows current loaded data)
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn active';
  allBtn.dataset.filter = 'all';
  allBtn.textContent = 'All';
  allBtn.addEventListener('click', () => {
    row.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    allBtn.classList.add('active');
    renderCards('all', document.getElementById('sort-select').value);
    setupLazyLoad();
  });
  row.appendChild(allBtn);

  // Niche buttons (act as quick search triggers)
  getNiches().forEach(niche => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = niche;
    btn.addEventListener('click', () => {
      row.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      quickSearch(niche.toLowerCase());
    });
    row.appendChild(btn);
  });

  row.appendChild(sortEl);

  // Load saved niches into settings input
  document.getElementById('niches-input').value = getNiches().join(', ');
}

function renderCards(filter, sort) {
  const grid = document.getElementById('grid');
  let filtered;
  if (filter === 'all') filtered = [...currentVideos];
  else if (filter === 'favorites') {
    filtered = getFavoriteVideos();
    if (filtered.length === 0) {
      grid.innerHTML = '<div class="empty">No starred videos yet — click the star on any video to save it here</div>';
      return;
    }
  }
  else filtered = currentVideos.filter(v => v.category === filter);

  if (sort === 'plays') filtered.sort((a,b) => b.playCount - a.playCount);
  else if (sort === 'likes') filtered.sort((a,b) => b.diggCount - a.diggCount);
  else if (sort === 'shares') filtered.sort((a,b) => b.shareCount - a.shareCount);
  else if (sort === 'recent') filtered.sort((a,b) => new Date(b.createTimeISO) - new Date(a.createTimeISO));

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">No videos in this category</div>';
    return;
  }

  grid.innerHTML = filtered.map((v, i) => `
    <div class="card" data-category="${v.category}">
      <div class="card-embed" id="embed-${v.id}" data-video-id="${v.id}">
        ${i < 6
          ? `<iframe src="https://www.tiktok.com/player/v1/${v.id}?hide_share=1&hide_like=1&hide_comment=1&hide_music=1" allowfullscreen allow="encrypted-media" loading="${i < 3 ? 'eager' : 'lazy'}"></iframe>`
          : `<div class="placeholder" onclick="loadEmbed('${v.id}')">
              <div class="play-icon">&#9654;</div>
              <div class="placeholder-text">Scroll to load</div>
            </div>`
        }
        ${v.duration ? `<div class="duration-badge">${formatDuration(v.duration)}</div>` : ''}
        <button class="star-btn ${isFavorite(v.id) ? 'starred' : ''}" onclick="event.stopPropagation(); toggleFavorite('${v.id}', this)">&#9733;</button>
      </div>
      <div class="card-body">
        <div class="card-meta">
          <span class="card-category ${catClass(v.category)}">${v.category}</span>
          <span class="card-author">@${v.author}</span>
        </div>
        <div class="card-text">${v.text || 'No description'}</div>
        <div class="card-stats">
          <div class="stat"><span class="stat-value">${formatNum(v.playCount)}</span><span class="stat-label">Plays</span></div>
          <div class="stat"><span class="stat-value">${formatNum(v.diggCount)}</span><span class="stat-label">Likes</span></div>
          <div class="stat"><span class="stat-value">${formatNum(v.shareCount)}</span><span class="stat-label">Shares</span></div>
          <div class="stat"><span class="stat-value">${formatNum(v.commentCount)}</span><span class="stat-label">Comments</span></div>
        </div>
        <div class="card-actions">
          <button class="btn btn-remake" onclick="remakeInPollo('${v.url}', this)">Remake in Pollo</button>
          <button class="btn btn-copy" onclick="copyUrl('${v.url}', this)">Copy URL</button>
          <a class="btn btn-open" href="${v.url}" target="_blank" rel="noopener">TikTok</a>
        </div>
      </div>
    </div>
  `).join('');
}

function loadEmbed(videoId) {
  const container = document.getElementById('embed-' + videoId);
  container.innerHTML = `<iframe src="https://www.tiktok.com/player/v1/${videoId}?autoplay=1&hide_share=1&hide_like=1&hide_comment=1&hide_music=1" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
}

function remakeInPollo(url, btn) {
  navigator.clipboard.writeText(url).then(() => {
    btn.textContent = 'URL Copied — Opening Pollo...';
    btn.classList.add('clicked');
    setTimeout(() => { btn.textContent = 'Remake in Pollo'; btn.classList.remove('clicked'); }, 3000);
    window.open('https://pollo.ai/app/ai-agent', '_blank');
  });
}

function copyUrl(url, btn) {
  navigator.clipboard.writeText(url).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy URL'; btn.classList.remove('copied'); }, 2000);
  });
}

// Sort
document.getElementById('sort-select').addEventListener('change', (e) => {
  const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;
  renderCards(activeFilter, e.target.value);
  setupLazyLoad();
});

// Lazy-load remaining videos on scroll
function setupLazyLoad() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const container = entry.target;
        const videoId = container.dataset.videoId;
        if (container.querySelector('.placeholder')) {
          container.innerHTML = `<iframe src="https://www.tiktok.com/player/v1/${videoId}?hide_share=1&hide_like=1&hide_comment=1&hide_music=1" allowfullscreen allow="encrypted-media"></iframe>`;
        }
        observer.unobserve(container);
      }
    });
  }, { rootMargin: '200px' });

  document.querySelectorAll('.card-embed').forEach(el => {
    if (el.querySelector('.placeholder')) observer.observe(el);
  });
}

// Settings panel
function toggleSettings() {
  document.getElementById('settings-panel').classList.toggle('open');
}

function saveToken() {
  const token = document.getElementById('apify-token').value.trim();
  if (token) {
    localStorage.setItem('apify_token', token);
    document.getElementById('token-status').textContent = 'Saved!';
    setTimeout(() => { document.getElementById('token-status').textContent = ''; }, 2000);
  }
}

// Load saved token on start
(function() {
  const saved = localStorage.getItem('apify_token');
  if (saved) document.getElementById('apify-token').value = saved;
})();

// Search niche via Apify
async function searchNiche() {
  const query = document.getElementById('niche-input').value.trim();
  if (!query) return;

  const token = localStorage.getItem('apify_token');
  if (!token) {
    toggleSettings();
    document.getElementById('token-status').textContent = 'Enter your Apify token first';
    document.getElementById('token-status').style.color = '#ef4444';
    setTimeout(() => { document.getElementById('token-status').textContent = ''; document.getElementById('token-status').style.color = '#22c55e'; }, 3000);
    return;
  }

  const btn = document.getElementById('search-btn');
  btn.disabled = true;
  btn.textContent = 'Searching...';
  document.getElementById('subtitle').textContent = `Searching TikTok for "${query}"...`;

  try {
    // Start the scraper run
    const runResp = await fetch(
      `https://api.apify.com/v2/acts/clockworks~tiktok-scraper/runs?token=${token}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          searchQueries: [query],
          resultsPerPage: 20,
          shouldDownloadCovers: false,
          shouldDownloadSlideshowImages: false,
          shouldDownloadSubtitles: false,
          shouldDownloadVideos: false
        })
      }
    );
    const runData = await runResp.json();
    const datasetId = runData.data?.defaultDatasetId;

    if (!datasetId) throw new Error('No dataset returned');

    // Poll for results (Apify runs take 15-45 seconds)
    btn.textContent = 'Scraping TikTok...';
    let items = [];
    for (let attempt = 0; attempt < 20; attempt++) {
      await new Promise(r => setTimeout(r, 3000));
      const itemsResp = await fetch(
        `https://api.apify.com/v2/datasets/${datasetId}/items?token=${token}&limit=20&format=json`
      );
      items = await itemsResp.json();
      if (items.length > 0) break;
      btn.textContent = `Scraping TikTok... (${(attempt+1)*3}s)`;
    }

    if (items.length === 0) throw new Error('No results found');

    // Transform to our format
    const niceName = query.charAt(0).toUpperCase() + query.slice(1);
    const newVideos = items.map(item => ({
      id: item.id || '',
      category: niceName,
      text: (item.text || '').slice(0, 200),
      playCount: item.playCount || 0,
      diggCount: item.diggCount || 0,
      shareCount: item.shareCount || 0,
      commentCount: item.commentCount || 0,
      url: item.webVideoUrl || '',
      author: item.authorMeta?.name || '',
      authorNickname: item.authorMeta?.nickName || '',
      coverUrl: '',
      createTimeISO: item.createTimeISO || '',
      duration: item.videoMeta?.duration || 0,
    })).filter(v => v.id && v.url);

    // Replace current videos with search results
    currentVideos = newVideos;
    buildFilterButtons();
    renderCards('all', 'plays');
    setupLazyLoad();
    document.getElementById('subtitle').textContent = `${newVideos.length} videos found for "${query}"`;

  } catch (err) {
    document.getElementById('subtitle').textContent = `Error: ${err.message}`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Search TikTok';
  }
}

// Enter key triggers search
document.getElementById('niche-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') searchNiche();
});

</script>
